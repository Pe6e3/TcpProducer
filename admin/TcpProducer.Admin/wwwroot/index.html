<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<base href="/tcp/">
	<title>TcpProducer Admin</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="page">
		<header class="header">
			<div>
				<h1>TcpProducer</h1>
				<p class="subtitle">Управление сервисом симулятора</p>
			</div>
			<div class="header-stats">
				<div class="packet-counter" title="TCP-пакетов за последние 60 минут">
					<span class="packet-counter-label">60 мин</span>
					<span class="packet-counter-value" id="packetCount60">—</span>
				</div>
				<div class="packet-counter packet-counter-muted" title="Всего отправлено с запуска сервиса">
					<span class="packet-counter-label">Всего</span>
					<span class="packet-counter-value" id="packetCount">—</span>
				</div>
				<div class="status-badge" id="statusBadge">—</div>
			</div>
		</header>

		<section class="card">
			<label class="label" for="tokenInput">API-токен</label>
			<div class="token-row">
				<input id="tokenInput" type="password" placeholder="ADMIN_API_TOKEN из .env" autocomplete="off">
				<button id="saveTokenBtn" class="btn btn-secondary" type="button">Сохранить</button>
			</div>
		</section>

		<section class="card">
			<div class="card-head">
				<h2>Пакеты по минутам</h2>
				<span class="chart-hint">последние 60 мин</span>
			</div>
			<div class="chart" id="packetsChart" aria-label="График пакетов за 60 минут">
				<p class="chart-empty">Подключите токен для загрузки графика</p>
			</div>
		</section>

		<section class="card">
			<div class="actions">
				<button id="statusBtn" class="btn" type="button">Статус</button>
				<button id="startBtn" class="btn btn-success" type="button">Запуск</button>
				<button id="stopBtn" class="btn btn-danger" type="button">Остановка</button>
				<button id="deployBtn" class="btn btn-primary" type="button">Деплой</button>
			</div>
		</section>

		<section class="card">
			<div class="card-head">
				<h2>Вывод</h2>
				<button id="clearBtn" class="btn btn-secondary btn-sm" type="button">Очистить</button>
			</div>
			<pre id="output" class="output">Готово.</pre>
		</section>

		<section class="card">
			<div class="card-head">
				<h2>Логи сервиса</h2>
				<div class="actions">
					<button id="logsStartBtn" class="btn btn-success btn-sm" type="button">Смотреть онлайн</button>
					<button id="logsStopBtn" class="btn btn-danger btn-sm" type="button" disabled>Стоп</button>
					<button id="logsClearBtn" class="btn btn-secondary btn-sm" type="button">Очистить</button>
				</div>
			</div>
			<pre id="logsOutput" class="output logs-output">Нажмите «Смотреть онлайн».</pre>
		</section>
	</div>

	<script src="app.js"></script>
</body>
</html>
