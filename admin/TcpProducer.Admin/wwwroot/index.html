<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<base href="/tcp/">
	<title>TcpProducer Admin</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="page">
		<header class="header">
			<div>
				<h1>TcpProducer</h1>
				<p class="subtitle">Управление сервисом симулятора</p>
			</div>
			<div class="header-stats">
				<div class="packet-counter" title="TCP-пакетов за последние 60 минут">
					<span class="packet-counter-label">60 мин</span>
					<span class="packet-counter-value" id="packetCount60">—</span>
				</div>
				<div class="packet-counter packet-counter-muted" title="Всего отправлено с запуска сервиса">
					<span class="packet-counter-label">Всего</span>
					<span class="packet-counter-value" id="packetCount">—</span>
				</div>
				<button type="button" id="powerToggle" class="power-toggle is-off" aria-pressed="false" title="Сервис остановлен — нажмите для запуска" disabled>
					<span class="power-toggle-ring"></span>
				</button>
			</div>
		</header>

		<section class="card" id="tokenCard">
			<label class="label" for="tokenInput">API-токен</label>
			<div class="token-row">
				<input id="tokenInput" type="password" placeholder="ADMIN_API_TOKEN из .env" autocomplete="off">
				<button id="saveTokenBtn" class="btn btn-secondary" type="button">Сохранить</button>
			</div>
		</section>

		<section class="card" id="configCard" hidden>
			<div class="card-head">
				<h2>Конфигурация</h2>
				<span class="chart-hint">appsettings.json</span>
			</div>

			<div class="config-grid">
				<label class="field">
					<span class="field-label">Количество устройств</span>
					<input id="cfgMaxDevices" type="number" min="0" max="50000" title="0 = все из файла">
				</label>
				<label class="field">
					<span class="field-label">Интервал выхода на связь</span>
					<input id="cfgConnectInterval" type="text" placeholder="01:00:00">
				</label>
				<label class="field">
					<span class="field-label">Интервал пакетов</span>
					<input id="cfgPacketInterval" type="text" placeholder="01:00:00">
				</label>
				<label class="field">
					<span class="field-label">Длительность сессии</span>
					<input id="cfgSessionDuration" type="text" placeholder="00:00:10">
				</label>
			</div>

			<div class="actions config-actions">
				<button id="toggleDevicesBtn" class="btn btn-secondary" type="button">Устройства</button>
				<button id="configReloadBtn" class="btn btn-secondary" type="button">Обновить</button>
				<button id="configSaveBtn" class="btn btn-primary" type="button">Сохранить и перезапустить</button>
			</div>

			<div id="serialsPanel" class="serials-panel" hidden>
				<div class="card-head serials-panel-head">
					<h3 class="config-section-title">Серийные номера</h3>
					<span class="chart-hint" id="serialsLineCount">—</span>
				</div>
				<label class="field">
					<span class="field-label">deviceserials.txt — по одному номеру на строку</span>
					<textarea id="serialsContent" class="serials-textarea" spellcheck="false"></textarea>
				</label>
				<div class="actions config-actions">
					<button id="serialsReloadBtn" class="btn btn-secondary" type="button">Обновить</button>
					<button id="serialsSaveBtn" class="btn btn-primary" type="button">Сохранить и перезапустить</button>
				</div>
			</div>
		</section>

		<section class="card">
			<div class="card-head">
				<h2>Пакеты по минутам</h2>
				<span class="chart-hint">последние 60 мин</span>
			</div>
			<div class="chart" id="packetsChart" aria-label="График пакетов за 60 минут">
				<p class="chart-empty">Подключите токен для загрузки графика</p>
			</div>
		</section>

		<section class="card">
			<div class="card-head">
				<h2>Логи сервиса</h2>
				<div class="actions">
					<button id="logsStartBtn" class="btn btn-success btn-sm" type="button">Смотреть онлайн</button>
					<button id="logsStopBtn" class="btn btn-danger btn-sm" type="button" disabled>Стоп</button>
					<button id="logsClearBtn" class="btn btn-secondary btn-sm" type="button">Очистить</button>
				</div>
			</div>
			<pre id="logsOutput" class="output logs-output">Нажмите «Смотреть онлайн».</pre>
		</section>
	</div>

	<script src="app.js"></script>
</body>
</html>
